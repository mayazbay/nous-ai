name: scan-credentials

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run credential scanner self-test
        run: python3 tools/scan_credentials.py --self-test
      - name: Full-repo scan (all PUBLIC-classified files)
        run: python3 tools/scan_credentials.py --all-public
